<script>

    window.chatCompany = '1d1bd44a-236a-11ef-961a-0efa6ad28f4f';

</script>

<script src='https://hub.notificame.com.br/schedule/webchat.js'></script>

 <script>
const autoShadow = setInterval(() => {
  const container = document.querySelector('#notificame-chat-container');

  if (container && container.shadowRoot) {

    const shadow = container.shadowRoot;

    const nameInput = shadow.getElementById('userName');
    const phoneInput = shadow.getElementById('userPhone');
    const form = shadow.getElementById('userInfoForm');

    if (nameInput && phoneInput && form) {

      function preencher(input, valor) {
        input.value = valor;
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
      }

      preencher(nameInput, 'Visitante');
      preencher(phoneInput, '84999999999');

      setTimeout(() => {
        const btn = form.querySelector('button[type="submit"]');
        if (btn) btn.click();
      }, 300);

      clearInterval(autoShadow);
    }
  }
}, 500);
</script>
</body>
</html>
